# Supabase CLI config for the Gooqi medical transcriber.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "giokilhxwatscmjcidwl"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# NOTE: `supabase config push` will always print an error at the very end —
# "unexpected status 402: Please upgrade the project to a paid tier to enable
# vector buckets". This is the CLI defaulting [vector].enabled to true against
# a free-tier project; setting it to false locally does not suppress it (CLI
# schema quirk, confirmed 2026-07). It is harmless and unrelated to Auth/API/DB
# — those are applied first and the push output will say "up to date" /
# show their diff BEFORE this trailing Storage error, so check for that rather
# than the overall exit code.

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Email OTP (magic-link / one-time code) sign-in for doctors.
[auth.email.template]

# Custom SMTP (Resend) — the built-in mailer is hard-capped at 2 emails/hour
# project-wide with no way to raise it; custom SMTP removes that ceiling.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_SMTP_PASS)"
admin_email = "onboarding@resend.dev"
sender_name = "Gooqi Scribe"

[auth.rate_limit]
email_sent = 100

[analytics]
enabled = false
