# Render Blueprint — deploys the Gooqi backend on Render's Free Plan.
#
# The frontend (apps/web) is NOT here — it deploys to Vercel.
#
# Background worker and Redis are removed. The Express API handles
# transcription and note generation in-process asynchronously.
#
# Setup: Render Dashboard → New → Blueprint → connect this repo → apply.
# Then fill the `sync: false` secrets in the service's Environment tab.

services:
  # -------------------------------------------------------------- API (HTTP)
  - type: web
    name: gooqi-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile --prod=false
    startCommand: pnpm --filter @gooqi/api exec tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false # https://<ref>.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # server-only secret
      - key: WEB_ORIGIN
        sync: false # your Vercel URL, e.g. https://gooqi-scribe.vercel.app
      - key: ASR_PROVIDER
        value: mock # switch to sarvam/deepgram/assemblyai/etc. once keys are set
      - key: GEMINI_API_KEY
        sync: false # required for SOAP/prescription/summary generation
      - key: SARVAM_API_KEY
        sync: false # optional
      - key: DEEPGRAM_API_KEY
        sync: false # optional
      - key: ASSEMBLYAI_API_KEY
        sync: false # optional
